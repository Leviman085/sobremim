<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leviman85</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

  :root{
    --bg: #0A0A0C;
    --ink: #F2F2F0;
    --muted: #8A8A90;
    --accent: #5B6BFF;
    --line: #232326;
  }

  *{ box-sizing: border-box; margin:0; padding:0; }

  html{ scroll-behavior: smooth; background: var(--bg); height: 100%; }

  body{
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px 20px;
    -webkit-font-smoothing: antialiased;
  }

  .page{
    width: 100%;
    max-width: 460px;
  }

  .eyebrow{
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 18px;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards;
  }

  .eyebrow .dot{
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 2.4s ease-in-out infinite;
  }

  h1{
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: clamp(42px, 11vw, 64px);
    line-height: 1;
    letter-spacing: -0.02em;
    margin-bottom: 14px;
    opacity: 0;
    animation: fadeUp 0.6s ease 0.08s forwards;
  }

  h1 span{
    color: var(--accent);
  }

  .tagline{
    font-size: 15px;
    color: var(--muted);
    line-height: 1.5;
    max-width: 360px;
    margin-bottom: 44px;
    opacity: 0;
    animation: fadeUp 0.6s ease 0.16s forwards;
  }

  .links{
    display: flex;
    flex-direction: column;
    border-top: 1px solid var(--line);
  }

  .link-row{
    position: relative;
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 20px 4px;
    border-bottom: 1px solid var(--line);
    text-decoration: none;
    color: var(--ink);
    opacity: 0;
    animation: fadeUp 0.6s ease forwards;
    overflow: hidden;
  }

  .link-row:nth-of-type(1){ animation-delay: 0.24s; }
  .link-row:nth-of-type(2){ animation-delay: 0.32s; }

  .link-row::before{
    content: "";
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--accent);
    transform: scaleY(0);
    transform-origin: bottom;
    transition: transform 0.35s cubic-bezier(.4,0,.2,1);
  }

  .link-row:hover::before,
  .link-row:focus-visible::before{
    transform: scaleY(1);
  }

  .link-row:hover,
  .link-row:focus-visible{
    padding-left: 16px;
  }

  .icon{
    flex-shrink: 0;
    width: 22px;
    height: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--ink);
  }

  .icon svg{ width: 100%; height: 100%; }

  .link-text{
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .link-label{
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 500;
    font-size: 17px;
  }

  .link-sub{
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--muted);
  }

  .arrow{
    font-family: 'Space Grotesk', sans-serif;
    font-size: 18px;
    color: var(--muted);
    transition: transform 0.3s ease, color 0.3s ease;
  }

  .link-row:hover .arrow,
  .link-row:focus-visible .arrow{
    transform: translateX(4px);
    color: var(--accent);
  }

  footer{
    margin-top: 40px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.04em;
    opacity: 0;
    animation: fadeUp 0.6s ease 0.4s forwards;
  }

  @keyframes fadeUp{
    from{ opacity: 0; transform: translateY(10px); }
    to{ opacity: 1; transform: translateY(0); }
  }

  @keyframes pulse{
    0%, 100%{ opacity: 1; }
    50%{ opacity: 0.35; }
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation: none !important; transition: none !important; opacity: 1 !important; }
  }

  a:focus-visible{
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }
</style>
</head>
